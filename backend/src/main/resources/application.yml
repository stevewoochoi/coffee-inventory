spring:
  datasource:
    url: ${DB_URL}?useSSL=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: ${APP_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000
  aws:
    region: ${AWS_REGION:ap-northeast-1}
    s3:
      bucket: ${S3_BUCKET:coffee-inventory-files}
    ses:
      from-email: ${SES_FROM_EMAIL:no-reply@yourdomain.com}
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@coffee.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.coffee: DEBUG
    org.hibernate.SQL: DEBUG

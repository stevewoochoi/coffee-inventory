spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

server:
  port: 0

app:
  jwt:
    secret: test-jwt-secret-key-minimum-32-characters-long-for-hmac
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000

logging:
  level:
    com.coffee: DEBUG
